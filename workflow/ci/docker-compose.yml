services:
  db:
    image: postgres:16-alpine
    container_name: sonar_postgres
    environment:
      - POSTGRES_USER=sonar
      - POSTGRES_PASSWORD=sonar
      - POSTGRES_DB=sonarqube
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ci_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonar -d sonarqube"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres_backend:
    image: postgres:16-alpine
    container_name: postgres_backend
    environment:
      - POSTGRES_USER=opsboarduser
      - POSTGRES_PASSWORD=ops@123
      - POSTGRES_DB=opsboard
    networks:
      - ci_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opsboarduser -d opsboard"]
      interval: 10s
      timeout: 5s
      retries: 5

  sonarqube:
    image: sonarqube:26.1.0.118079-community
    container_name: sonarqube
    depends_on:
      db:
        condition: service_healthy
    environment:
      - SONAR_JDBC_URL=jdbc:postgresql://db:5432/sonarqube
      - SONAR_JDBC_USERNAME=sonar
      - SONAR_JDBC_PASSWORD=sonar
    ports:
      - "9000:9000"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    networks:
      - ci_net

  jenkins:
    build:
      context: ./jenkins
      dockerfile: Dockerfile
    container_name: jenkins_local
    user: root
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_data:/var/jenkins_home
      # Persistent volume for OWASP Dependency-Check data to avoid redownloading NVD info
      - jenkins_owasp_data:/var/jenkins_home/.owasp
      # Mount Docker socket so Jenkins can run Docker containers (like Trivy) if needed
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - ci_net

volumes:
  postgres_data:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  jenkins_data:
  jenkins_owasp_data:

networks:
  ci_net:
    driver: bridge

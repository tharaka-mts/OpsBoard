apiVersion: apps/v1
kind: Deployment
metadata:
  name: opsboard-backend
  labels:
    app: opsboard-backend
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      app: opsboard-backend
  template:
    metadata:
      labels:
        app: opsboard-backend
    spec:
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.backend.containerPort }}
              name: http
          envFrom:
            - configMapRef:
                name: opsboard-config
            - secretRef:
                name: opsboard-secret
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10

{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: opsboard-ingress
  namespace: {{ .Release.Namespace }}
  labels:
    app: opsboard
  annotations:
    ingress.kubernetes.io/ssl-redirect: "false"
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: nginx
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: opsboard-backend
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: opsboard-frontend
                port:
                  number: 80
{{- end }}

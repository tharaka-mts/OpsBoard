apiVersion: v1
kind: Secret
metadata:
  name: opsboard-secret
  labels:
    app: opsboard
type: Opaque
stringData:
  # In a real environment, these would be managed by an external secret store or SOPS
  SPRING_DATASOURCE_PASSWORD: "{{ .Values.postgres.passwordPlaceholder }}"
  POSTGRES_PASSWORD: "{{ .Values.postgres.passwordPlaceholder }}"

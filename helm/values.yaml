backend:
  image:
    repository: 379395160438.dkr.ecr.us-east-1.amazonaws.com/opsboard-backend
    tag: "prod-9"
    pullPolicy: IfNotPresent
  replicaCount: 1
  containerPort: 8080
  servicePort: 8080

frontend:
  image:
    repository: 379395160438.dkr.ecr.us-east-1.amazonaws.com/opsboard-frontend
    tag: "prod-9"
    pullPolicy: IfNotPresent
  replicaCount: 1
  containerPort: 80
  servicePort: 80

postgres:
  image:
    repository: postgres
    tag: "prod-9"
    pullPolicy: IfNotPresent
  port: 5432
  database: opsboard
  username: opsboard_user
  passwordPlaceholder: "replace-me"
  storageSize: 1Gi

ingress:
  enabled: true
  className: nginx
  host: opsboard.local
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"

config:
  springProfilesActive: "prod"

# Required metadata
sonar.projectKey=OpsBoard
sonar.projectName=OpsBoard
sonar.projectVersion=1.0

# Comma-separated paths to directories with sources (required)
sonar.sources=backend/src/main/java,frontend/src

# Language specs
sonar.language=java,ts,tsx
sonar.java.binaries=backend/target/classes
sonar.java.test.binaries=backend/target/test-classes

# Test scopes
sonar.tests=backend/src/test/java,frontend/src
sonar.test.inclusions=**/*.spec.ts,**/*.test.ts,**/*.test.tsx,**/*Test.java

# Coverage reports paths (Wait for tools to generate these)
sonar.java.coveragePlugin=jacoco
sonar.coverage.jacoco.xmlReportPaths=backend/target/site/jacoco/jacoco.xml
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

# Encoding of the source files
sonar.sourceEncoding=UTF-8

# Excluding non-source folders
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/target/**
